<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 网页被Minecraft活塞盗走了</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 20%;
        }
        h1 {
            font-size: 48px;
            color: #333;
        }
        p {
            font-size: 24px;
            color: #666;
        }
        #countdown {
            font-size: 20px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>网页被Minecraft活塞盗走了→_→</p>
    <div id="countdown">将在 <span id="timer">5</span> 秒后跳转回主页...</div>

    <script>
        // 设置倒计时时间（秒）
        let timeLeft = 5;

        // 获取显示倒计时的元素
        const timerElement = document.getElementById("timer");

        // 设置倒计时函数
        const countdown = setInterval(() => {
            timeLeft--; // 每秒减1
            timerElement.textContent = timeLeft; // 更新显示的倒计时

            // 倒计时结束后跳转
            if (timeLeft <= 0) {
                clearInterval(countdown); // 停止倒计时
                window.location.href = "https://HuoSaijun40.github.io"; // 跳转到指定主页
            }
        }, 1000); // 每秒执行一次
    </script>
</body>
</html>
