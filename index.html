<head>
    <meta charset="UTF-8">

    <style>
        /* 通用样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh; /* 确保背景覆盖整个页面 */
            position: relative;
            overflow: hidden; /* 隐藏页面滚动条 */
        }

        /* 背景图容器 */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 背景图在最底层 */
            background-image: url('https://HuoSaijun40.github.io/HuoSaijun.png');
            background-size: cover;
            background-position: center;
            filter: blur(5px); /* 背景图模糊效果 */
        }

        /* 遮罩层 */
        .background-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.3); /* 添加半透明遮罩 */
        }

        /* 头部图片 */
        .header-image {
            width: 100%;
            height: 150px;
            position: fixed; /* 头部固定 */
            top: 0;
            left: 0;
            z-index: 1; /* 确保头部在背景之上 */
        }

        /* 标题和内容容器 */
        .header-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 2; /* 确保内容在背景和头部之上 */
            padding: 20px;
            background: transparent; /* 背景透明 */
            box-sizing: border-box; /* 确保 padding 不会增加宽度 */
        }

        .header-content h1 {
            font-size: 24px;
            margin: 0;
            color: #000;
            background: rgba(255, 255, 255, 0.8); /* 标题背景半透明 */
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block; /* 让标题背景仅包裹文字 */
        }

        .header-content p {
            font-size: 14px;
            margin: 5px 0 0;
            color: #333;
            word-wrap: break-word; /* 确保长文本自动换行 */
            max-width: 100%; /* 限制内容宽度 */
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8); /* 内容背景半透明 */
            border-radius: 10px;
            display: inline-block; /* 让内容背景仅包裹文字 */
            box-sizing: border-box; /* 确保 padding 不会增加宽度 */
        }

        /* 按钮容器 */
        .button-container {
            position: fixed;
            top: 200px; /* 初始值，稍后通过 JavaScript 动态调整 */
            left: 0;
            right: 0;
            bottom: 0; /* 确保按钮容器覆盖页面的剩余部分 */
            overflow-y: auto; /* 按钮部分单独滚动 */
            z-index: 1; /* 确保按钮在背景之上，但在内容之下 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .button {
            margin: 8px 0;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 25px; /* 默认圆角更大 */
            cursor: pointer;
            text-decoration: none;
            width: auto;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .button:hover {
            background-color: #0056b3;
        }

        .category {
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        /* 淡入动画 */
        .fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* 响应式布局 */
        @media (min-width: 768px) {
            .header-image { 
                height: 200px;
            }
            .button { 
                margin: 10px;
                border-radius: 25px; /* 桌面端按钮圆角更大 */
            }
            .category { font-size: 20px; }
        }

        @media (max-width: 767px) {
            .header-image { 
                height: 120px;
            }
            .button {
                font-size: 14px;
                border-radius: 25px; /* 手机端按钮圆角 */
                padding: 10px 20px;
                margin: 8px 0;
                width: auto;
            }
            .category { font-size: 16px; }
        }
    </style>
</head>
<body>

    <script>
        // 使用 IntersectionObserver 实现淡入动画
        const fadeInElements = document.querySelectorAll('.button, .category');

        const observer = new IntersectionObserver(
            (entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        // 当元素进入视口时，添加淡入效果
                        entry.target.classList.add('fade-in');
                    } else {
                        // 当元素完全离开视口时，移除淡入效果
                        entry.target.classList.remove('fade-in');
                    }
                });
            },
            {
                rootMargin: '0px',
                threshold: 0.01, // 当元素至少 1% 进入视口时触发
            }
        );

        fadeInElements.forEach((element) => {
            observer.observe(element);
        });

        // 动态检测内容背景的底部坐标，并将按钮容器的 top 值设置为该坐标
        const headerContent = document.querySelector('.header-content');
        const buttonContainer = document.querySelector('.button-container');

        if (headerContent && buttonContainer) {
            // 获取内容背景的底部坐标
            const headerContentRect = headerContent.getBoundingClientRect();
            const headerContentBottom = headerContentRect.bottom;

            // 设置按钮容器的 top 值为内容背景的底部坐标
            buttonContainer.style.top = `${headerContentBottom}px`;
        }
    </script>
