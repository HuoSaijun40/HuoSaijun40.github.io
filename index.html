    <style>
        /* 全局样式 */
        :root {
            /* 浅色主题 */
            --bg-color: #e6f2ff;
            --card-bg-color: white;
            --text-color: #333;
            --secondary-text-color: #666;
            --button-gradient: linear-gradient(to bottom, #00b4ff, #007bff);
            --button-hover-gradient: linear-gradient(to bottom, #0094ff, #0056b3);
            --shadow-color: rgba(0, 0, 0, 0.05);
            --hover-shadow-color: rgba(0, 0, 0, 0.15);
            --toggle-bg: #ccc;
            --toggle-bg-active: #007bff;
        }

        /* 深色主题（柔和版） */
        [data-theme="dark"] {
            --bg-color: #1f2937; /* 更柔和的深色背景 */
            --card-bg-color: #2d3748; /* 更柔和的卡片背景 */
            --text-color: #ffffff; /* 更清晰的文字颜色 */
            --secondary-text-color: #cbd5e1; /* 更柔和的次要文字颜色 */
            --button-gradient: linear-gradient(to bottom, #3b82f6, #1d4ed8); /* 调整后的按钮颜色 */
            --button-hover-gradient: linear-gradient(to bottom, #2563eb, #1e40af); /* 调整后的按钮悬停颜色 */
            --shadow-color: rgba(0, 0, 0, 0.2); /* 更柔和的阴影 */
            --hover-shadow-color: rgba(0, 0, 0, 0.3); /* 更柔和的悬停阴影 */
            --toggle-bg: #6b7280;
            --toggle-bg-active: #3b82f6;
        }

        /* 过渡效果 */
        body {
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .section {
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        /* 基础样式 */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        header {
            margin-bottom: 40px;
        }
        
        h1 {
            color: var(--text-color);
            font-size: 2.5rem;
            margin: 0;
        }
        
        p {
            color: var(--secondary-text-color);
            max-width: 800px;
            margin-top: 10px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        .sections-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: flex-start;
        }
        
        .section {
            background-color: var(--card-bg-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px var(--shadow-color);
            flex: 1;
            min-width: 300px;
            max-width: calc(50% - 60px);
        }
        
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--text-color);
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 25px;
            background-image: var(--button-gradient);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .button:hover {
            background-image: var(--button-hover-gradient);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--hover-shadow-color);
        }

        /* 主题切换开关 */
        .theme-toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            margin-top: 20px;
        }

        .theme-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            transition: .4s;
            border-radius: 34px;
            outline: none !important; /* 强制移除轮廓 */
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--toggle-bg-active);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* 去掉按钮和其他元素的默认焦点轮廓 */
        * {
            outline: none !important; /* 强制移除所有轮廓 */
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            header {
                text-align: center;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            p {
                margin: 10px auto 0;
            }
            
            .sections-container {
                justify-content: center;
            }
            
            .section {
                flex: 0 0 calc(100% - 140px);
                max-width: calc(100% - 140px);
                padding: 20px;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .section {
                flex: 0 0 calc(100% - 100px);
                max-width: calc(100% - 100px);
                padding: 20px;
            }
            
            .button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }

        /* 添加浮动动画效果 */
        .button, .slider {
            transition: all 0.3s ease;
        }

        .button:hover, .slider:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

    <script>
        // 检测系统主题并设置初始主题
        function setThemeBasedOnSystem() {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        // 切换主题
        function toggleTheme() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }

        // 监听系统主题变化
        if (window.matchMedia) {
            const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
            colorSchemeQuery.addEventListener('change', (e) => {
                setThemeBasedOnSystem();
            });
        }

        // 初始化主题
        document.addEventListener('DOMContentLoaded', () => {
            // 不再使用localStorage，每次加载都根据系统主题设置
            setThemeBasedOnSystem();

            // 绑定主题切换按钮事件
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('change', toggleTheme);

            // 设置切换按钮初始状态
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                themeToggle.checked = true;
            } else {
                themeToggle.checked = false;
            }
        });
    </script>
