<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全平台歌词下载器</title>
    <style>
        :root {
            --primary-blue: #2196F3;
            --error-red: #f44336;
            --text-dark: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 25px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        #songInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #songInput:focus {
            border-color: var(--primary-blue);
            outline: none;
        }

        #searchBtn {
            padding: 12px 24px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #searchBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .lyrics-box {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 60vh;
            overflow-y: auto;
        }

        .error-panel {
            background: #ffebee;
            border-left: 4px solid var(--error-red);
            padding: 16px;
            margin: 15px 0;
            border-radius: 6px;
            display: none;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 15px;
            color: #666;
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 15px;
            }
            .search-box {
                flex-direction: column;
            }
            #searchBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>🎵 智能歌词下载器</h1>
        
        <div class="search-box">
            <input type="text" id="songInput" placeholder="请输入歌曲名称，如「海阔天空」" autocomplete="off">
            <button id="searchBtn">搜索歌词</button>
        </div>

        <div class="error-panel" id="errorPanel">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">⚠️</span>
                <div>
                    <div id="errorTitle" style="font-weight: 500;"></div>
                    <div id="errorDetail" style="font-size: 0.9em; margin-top: 5px;"></div>
                </div>
            </div>
        </div>

        <div class="loading-indicator" id="loading">
            <div class="loader"></div>
            <span>正在搜索中...</span>
        </div>

        <div id="lyricsContainer" style="display: none;">
            <div class="lyrics-box" id="lyricsContent"></div>
            <div style="margin-top: 15px; text-align: right;">
                <button onclick="handleDownload()" style="background: var(--primary-blue); color: white; padding: 10px 20px; border: none; border-radius: 6px;">下载歌词</button>
            </div>
        </div>
    </div>

<script>
// 配置参数
const CONFIG = {
    API_ENDPOINT: 'https://api.injahow.cn/meting/',
    CORS_PROXY: 'https://cors.chiya.dev/',
    RETRY_COUNT: 2
};

// 初始化
function init() {
    bindEvents();
    checkNetwork();
}

// 事件绑定
function bindEvents() {
    const searchBtn = document.getElementById('searchBtn');
    searchBtn.addEventListener('click', handleSearch);
    searchBtn.addEventListener('touchstart', e => {
        e.preventDefault();
        handleSearch();
    });

    let searchTimer;
    document.getElementById('songInput').addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (e.target.value.trim()) handleSearch();
        }, 500);
    });
}

// 核心搜索逻辑
async function handleSearch() {
    const song = document.getElementById('songInput').value.trim();
    if (!song) return showError('请输入歌曲名称');

    try {
        showLoading(true);
        clearError();

        // 搜索歌曲
        const searchUrl = `${CONFIG.CORS_PROXY}${CONFIG.API_ENDPOINT}?type=search&id=${encodeURIComponent(song)}`;
        const searchRes = await fetchWithRetry(searchUrl);
        const songs = await processResponse(searchRes);

        if (!songs.length) throw new Error('未找到匹配歌曲');

        // 获取歌词
        const lyricUrl = `${CONFIG.CORS_PROXY}${CONFIG.API_ENDPOINT}?type=lyric&id=${songs[0].id}`;
        const lyricRes = await fetchWithRetry(lyricUrl);
        const lyricData = await processResponse(lyricRes);

        displayLyrics(lyricData.lyric || '暂无歌词内容');
    } catch (error) {
        handleError(error);
    } finally {
        showLoading(false);
    }
}

// 带重试的fetch
async function fetchWithRetry(url, retries = CONFIG.RETRY_COUNT) {
    for (let i = 0; i < retries; i++) {
        try {
            const res = await fetch(url);
            if (res.ok) return res;
            throw new Error(`HTTP ${res.status}`);
        } catch (error) {
            if (i === retries - 1) throw error;
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }
}

// 处理响应
async function processResponse(response) {
    const data = await response.json();
    if (data.code && data.code !== 200) {
        throw new Error(data.msg || 'API返回错误');
    }
    return data;
}

// 显示歌词
function displayLyrics(content) {
    const container = document.getElementById('lyricsContainer');
    document.getElementById('lyricsContent').textContent = content;
    container.style.display = 'block';
}

// 错误处理
function handleError(error) {
    console.error('Error:', error);
    
    let title = '发生错误';
    let detail = error.message;

    if (error.message.includes('Failed to fetch')) {
        title = '网络连接失败';
        detail = '请检查：\n1. 网络连接状态\n2. 防火墙设置\n3. 尝试切换网络';
    } else if (error.message.includes('404')) {
        title = '内容未找到';
        detail = '请确认歌曲名称是否正确';
    }

    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorDetail').innerHTML = detail.replace(/\n/g, '<br>');
    document.getElementById('errorPanel').style.display = 'block';
}

// 下载处理
function handleDownload() {
    const content = document.getElementById('lyricsContent').textContent;
    if (!content) return showError('没有可下载的内容');

    try {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        if (/Mobile|Android/i.test(navigator.userAgent)) {
            window.open(url);
        } else {
            const link = document.createElement('a');
            link.href = url;
            link.download = `歌词_${Date.now().txt}`;
            link.click();
        }
        URL.revokeObjectURL(url);
    } catch (error) {
        handleError(error);
    }
}

// 辅助函数
function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function clearError() {
    document.getElementById('errorPanel').style.display = 'none';
}

function checkNetwork() {
    if (!navigator.onLine) {
        showError('当前处于离线状态，请检查网络连接');
        return false;
    }
    return true;
}

// 启动应用
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
