    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #e6f2ff; /* 淡蓝色背景 */
            color: #333;
        }
        
        header {
            margin-bottom: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin: 0;
        }
        
        p {
            color: #666;
            max-width: 800px;
            margin-top: 10px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px; /* 确保左右内边距一致 */
        }
        
        .sections-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: flex-start; /* 电脑端左对齐 */
        }
        
        .section {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            flex: 1;
            min-width: 300px;
            max-width: calc(50% - 60px); /* 电脑端宽度 */
        }
        
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 25px;
            background-image: linear-gradient(to bottom, #00b4ff, #007bff); /* 渐变色背景 */
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .button:hover {
            background-image: linear-gradient(to bottom, #0094ff, #0056b3); /* 悬停时的渐变色变化 */
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
        
        @media (max-width: 768px) {
            header {
                text-align: center;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            p {
                margin: 10px auto 0;
            }
            
            .sections-container {
                justify-content: center; /* 手机端居中 */
            }
            
            .section {
                flex: 0 0 calc(100% - 140px); /* 减小手机端宽度，左右保持70px的边距 */
                max-width: calc(100% - 140px);
                padding: 20px;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .section {
                flex: 0 0 calc(100% - 100px); /* 在小屏幕上进一步减小宽度，左右保持50px的边距 */
                max-width: calc(100% - 100px);
                padding: 20px;
            }
            
            .button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
