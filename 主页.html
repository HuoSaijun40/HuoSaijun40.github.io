    <title>minecraft活塞的主页</title>
    <style>
        /* 通用样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-image {
            width: 100%;
            height: 150px;
            background-image: url('https://HuoSaijun40.github.io/HuoSaijun.png');
            background-size: cover;
            background-position: center;
            filter: blur(2px); /* 默认模糊效果 */
            position: relative;
        }
        .header-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.3);
            z-index: 1;
        }
        .header-image img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            max-width: 100%;
            max-height: 100%;
        }
        .button {
            margin: 8px 0;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 25px; /* 默认圆角更大 */
            cursor: pointer;
            text-decoration: none;
            width: auto;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .category {
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        /* 淡入动画 */
        .fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* 响应式布局 */
        @media (min-width: 768px) {
            .header-image { 
                height: 200px;
                filter: blur(5px); /* 桌面端模糊效果更强 */
            }
            .button { 
                margin: 10px;
                border-radius: 25px; /* 桌面端按钮圆角更大 */
            }
            .category { font-size: 20px; }
        }

        @media (max-width: 767px) {
            .header-image { 
                height: 120px;
                filter: blur(2px); /* 手机端模糊效果 */
            }
            .button {
                font-size: 14px;
                border-radius: 25px; /* 手机端按钮圆角 */
                padding: 10px 20px;
                margin: 8px 0;
                width: auto;
            }
            .category { font-size: 16px; }
        }
    </style>
</head>

    <script>
        // 使用 IntersectionObserver 实现淡入动画
        const fadeInElements = document.querySelectorAll('.button, .category');

        const observer = new IntersectionObserver(
            (entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in');
                    } else {
                        entry.target.classList.remove('fade-in');
                    }
                });
            },
            {
                rootMargin: '0px',
                threshold: 0.1,
            }
        );

        fadeInElements.forEach((element) => {
            observer.observe(element);
        });
    </script>
